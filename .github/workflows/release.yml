name: Release Build

# Trigger: runs when you push a version tag like "v1.0.0"
# Also can be triggered manually from the GitHub Actions UI
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:   # Manual trigger via GitHub UI

jobs:
  build:
    strategy:
      fail-fast: false   # If one platform fails, the others continue
      matrix:
        include:
          # ─── macOS: Universal Binary (Apple Silicon + Intel) ────────────────
          - platform: macos-latest
            args: '--target universal-apple-darwin --bundles app,dmg'
            rust-targets: 'aarch64-apple-darwin,x86_64-apple-darwin'
            name: 'macOS Universal'

          # ─── Windows: x64 Installer (MSI + NSIS) ───────────────────────────
          - platform: windows-latest
            args: '--target x86_64-pc-windows-msvc --bundles msi,nsis'
            rust-targets: 'x86_64-pc-windows-msvc'
            name: 'Windows x64 Installer'

          # ─── Windows: x64 Portable (.exe, no installer) ─────────────────────
          - platform: windows-latest
            args: '--target x86_64-pc-windows-msvc --bundles nsis'
            rust-targets: 'x86_64-pc-windows-msvc'
            name: 'Windows x64 Portable'

    runs-on: ${{ matrix.platform }}
    name: Build ${{ matrix.name }}

    steps:
      # 1. Check out your repository code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Install Rust toolchain + the required cross-compilation targets
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      # 3. Cache Rust build artifacts (speeds up subsequent builds significantly)
      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      # 4. Install Node.js (needed for Tauri CLI)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # 5. Install npm dependencies (Tauri CLI etc.)
      - name: Install npm dependencies
        run: npm install

      # 6. Build Windows Installer (MSI + NSIS)
      - name: Build Tauri app (Installer)
        if: matrix.name == 'Windows x64 Installer'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.args }}
          tagName: ${{ github.ref_name }}
          releaseName: 'AudioLookUp ${{ github.ref_name }}'
          releaseBody: |
            ## AudioLookUp ${{ github.ref_name }}

            ### Downloads

            | Plattform | Format | Datei |
            |-----------|--------|-------|
            | 🍎 macOS (Universal) | App + DMG | `AudioLookUp_*_universal.dmg` |
            | 🪟 Windows x64 | MSI Installer | `AudioLookUp_*_x64_en-US.msi` |
            | 🪟 Windows x64 | NSIS Installer | `AudioLookUp_*_x64-setup.exe` |
            | 🪟 Windows x64 | Portable EXE | `AudioLookUp_*_x64_portable.exe` |

            ### Installation
            - **macOS**: DMG öffnen → App in Programme-Ordner ziehen
            - **Windows (Installer)**: `.msi` oder `*-setup.exe` ausführen
            - **Windows (Portable)**: `*_portable.exe` direkt starten – keine Installation nötig
          releaseDraft: true      # Creates a Draft release (you publish manually)
          prerelease: false

      # 7. Build Windows Portable (standalone EXE via NSIS /PORTABLE flag)
      - name: Build Tauri app (Portable)
        if: matrix.name == 'Windows x64 Portable'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_NSIS_ARGS: '/PORTABLE=1'
        with:
          args: ${{ matrix.args }}
          tagName: ${{ github.ref_name }}
          releaseName: 'AudioLookUp ${{ github.ref_name }}'
          releaseDraft: true
          prerelease: false

      # 8. Build macOS Universal
      - name: Build Tauri app (macOS)
        if: matrix.name == 'macOS Universal'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.args }}
          tagName: ${{ github.ref_name }}
          releaseName: 'AudioLookUp ${{ github.ref_name }}'
          releaseDraft: true
          prerelease: false
